register_binding:
  name: Register binding
  description: Register a remote-to-target binding.
  fields:
    remote_device_id:
      required: true
      selector:
        text: {}
    target_device_id:
      required: false
      selector:
        text: {}
    target_entity_id:
      required: false
      selector:
        text: {}
    binding_name:
      required: false
      selector:
        text: {}
    owner_user_id:
      required: false
      selector:
        text: {}

set_trigger_target:
  name: Set trigger target
  description: Create or replace a trigger-device target binding and create the matching Dinodia Remote Manager entry.
  fields:
    binding_id:
      required: false
      selector:
        text: {}
    remote_device_id:
      required: true
      selector:
        text: {}
    target_device_id:
      required: false
      selector:
        text: {}
    target_entity_id:
      required: false
      selector:
        text: {}
    binding_name:
      required: false
      selector:
        text: {}
    owner_user_id:
      required: false
      selector:
        text: {}
    create_config_entry:
      required: false
      default: true
      selector:
        boolean: {}

update_binding:
  name: Update binding
  description: Create or replace the target for one remote binding.
  fields:
    binding_id:
      required: false
      selector:
        text: {}
    remote_device_id:
      required: true
      selector:
        text: {}
    target_device_id:
      required: false
      selector:
        text: {}
    target_entity_id:
      required: false
      selector:
        text: {}
    binding_name:
      required: false
      selector:
        text: {}
    owner_user_id:
      required: false
      selector:
        text: {}

remove_tenant_bindings:
  name: Remove tenant bindings
  description: Remove all trigger-device bindings owned by a Dinodia tenant user.
  fields:
    owner_user_id:
      required: true
      selector:
        text: {}

remove_trigger_bindings_for_devices:
  name: Remove trigger bindings for devices
  description: Remove tenant-owned trigger bindings for specific HA trigger-device IDs.
  fields:
    owner_user_id:
      required: true
      selector:
        text: {}
    remote_device_ids:
      required: true
      selector:
        object: {}

unbind:
  name: Unbind
  description: Remove a binding by binding id or remote device id.
  fields:
    binding_id:
      required: false
      selector:
        text: {}
    remote_device_id:
      required: false
      selector:
        text: {}

resolve_binding:
  name: Resolve binding
  description: Return the computed target capability profile for a binding.
  fields:
    binding_id:
      required: false
      selector:
        text: {}
    remote_device_id:
      required: false
      selector:
        text: {}
    remote_entity_id:
      required: false
      selector:
        text: {}

list_bindings:
  name: List bindings
  description: Return all stored remote bindings for diagnostics.

list_trigger_devices:
  name: List trigger devices
  description: Return labelled devices that expose Home Assistant device triggers and have no actionable target for Dinodia trigger-device discovery.

list_trigger_device_dashboard:
  name: List trigger device dashboard
  description: Return accepted trigger devices with compact binding and target details for Dinodia dashboards.

simulate_remote_event:
  name: Simulate remote event
  description: Fire a normalized remote event through the router for testing.
  fields:
    remote_device_id:
      required: true
      selector:
        text: {}
    event_type:
      required: true
      selector:
        text: {}
    event_subtype:
      required: false
      selector:
        text: {}
    command:
      required: false
      selector:
        text: {}
    source:
      required: false
      selector:
        text: {}
    payload:
      required: false
      selector:
        object: {}
